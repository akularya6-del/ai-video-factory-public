name: Autonomous Video Factory (3 Channels)

on:
  schedule:
    # 5 videos per day per channel, staggered by 1 hour between channels
    # Each channel runs every ~5 hours so uploads spread evenly across the day.
    #
    # Channel 1: 00:00, 05:00, 10:00, 15:00, 20:00 UTC
    - cron: '0 0,5,10,15,20 * * *'
    # Channel 2: 01:00, 06:00, 11:00, 16:00, 21:00 UTC
    - cron: '0 1,6,11,16,21 * * *'
    # Channel 3: 02:00, 07:00, 12:00, 17:00, 22:00 UTC
    - cron: '0 2,7,12,17,22 * * *'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel to post to (e.g., channel_1)'
        required: true
        default: 'channel_1'
        type: choice
        options:
          - channel_1
          - channel_2
          - channel_3

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit state back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Determine Channel
        id: set_channel
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "channel=${{ github.event.inputs.channel }}" >> $GITHUB_ENV
          else
            # Map cron trigger hours to channels
            HOUR=$(date +"%H")
            if [ "$HOUR" == "00" ] || [ "$HOUR" == "05" ] || [ "$HOUR" == "10" ] || [ "$HOUR" == "15" ] || [ "$HOUR" == "20" ]; then
              echo "channel=channel_1" >> $GITHUB_ENV
            elif [ "$HOUR" == "01" ] || [ "$HOUR" == "06" ] || [ "$HOUR" == "11" ] || [ "$HOUR" == "16" ] || [ "$HOUR" == "21" ]; then
              echo "channel=channel_2" >> $GITHUB_ENV
            else
              echo "channel=channel_3" >> $GITHUB_ENV
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: npm ci

      - name: Run Video Pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CHANNEL_1: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CHANNEL_1 }}
          YOUTUBE_REFRESH_TOKEN_CHANNEL_2: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CHANNEL_2 }}
          YOUTUBE_REFRESH_TOKEN_CHANNEL_3: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CHANNEL_3 }}
          FFMPEG_PATH: /usr/bin/ffmpeg
          FOOTAGE_BASE_PATH: ./footage/gameplay
        run: |
          echo "Running pipeline for ${{ env.channel }}"
          node scripts/github-action.js --channel=${{ env.channel }}

      - name: Commit and Push Updated Scripts State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: mark script as used [skip ci]"
          git push
